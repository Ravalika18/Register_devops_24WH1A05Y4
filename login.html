<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <style>
    :root{--bg:#f3f6fb;--card:#ffffff;--accent:#4f46e5;--muted:#6b7280}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#eef2ff 0%,var(--bg) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:420px;background:var(--card);border-radius:12px;box-shadow:0 10px 30px rgba(17,24,39,0.08);padding:28px}
    h1{margin:0 0 8px;font-size:20px}
    p.lead{margin:0 0 18px;color:var(--muted);font-size:14px}
    label{display:block;font-size:13px;color:#111827;margin-bottom:6px}
    input[type="email"],input[type="password"]{width:100%;padding:10px 12px;border:1px solid #e6e9ef;border-radius:8px;font-size:15px}
    input:focus{outline:none;border-color:rgba(79,70,229,0.85);box-shadow:0 0 0 4px rgba(99,102,241,0.08)}
    .row{display:flex;gap:12px}
    .actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
    .btn{background:var(--accent);color:#fff;padding:10px 14px;border-radius:8px;border:none;font-weight:600;cursor:pointer}
    .btn.secondary{background:transparent;border:1px solid #e6e9ef;color:#111827}
    .muted{color:var(--muted);font-size:13px}
    .error{color:#b91c1c;font-size:13px;margin-top:8px;display:none}
    .footer{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
    .show-pass{font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
    @media (max-width:420px){body{padding:16px}.card{padding:20px}}
  </style>
</head>
<body>
  <main class="card" aria-labelledby="login-title">
    <h1 id="login-title">Sign in to your account</h1>
    <p class="lead">Enter your email and password to continue.</p>

    <form id="loginForm" novalidate>
      <div style="margin-bottom:12px">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
        <div id="emailError" class="error">Please enter a valid email address.</div>
      </div>

      <div style="margin-bottom:8px">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" minlength="6" required />
        <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
          <label class="show-pass"><input id="togglePass" type="checkbox" aria-label="Show password" /> Show</label>
          <a href="registration.html" class="muted">Create account</a>
        </div>
        <div id="passError" class="error">Password must be at least 6 characters.</div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)"><input type="checkbox" id="remember" /> Remember me</label>
        <a href="#" class="muted">Forgot password?</a>
      </div>

      <div class="actions">
        <button class="btn" type="submit">Sign in</button>
        <button type="button" class="btn secondary" id="demoBtn">Demo</button>
      </div>

      <div id="submitError" class="error">Invalid credentials. Try again.</div>
    </form>

    <div class="footer">By signing in you agree to our terms and privacy policy.</div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passError = document.getElementById('passError');
    const submitError = document.getElementById('submitError');
    const togglePass = document.getElementById('togglePass');
    const demoBtn = document.getElementById('demoBtn');

    togglePass.addEventListener('change', () => {
      password.type = togglePass.checked ? 'text' : 'password';
    });

    demoBtn.addEventListener('click', () => {
      email.value = 'demo@example.com';
      password.value = 'demopass';
    });

    function show(el){ el.style.display = 'block'; }
    function hide(el){ el.style.display = 'none'; }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      hide(emailError); hide(passError); hide(submitError);

      let valid = true;
      if (!email.checkValidity()) { show(emailError); valid = false; }
      if (!password.checkValidity()) { show(passError); valid = false; }

      if (!valid) return;

      // Demo client-side "authentication" (replace with real backend call)
      const payload = { email: email.value.trim(), password: password.value };

      // Simple mock: accept demo@example.com / demopass or any non-empty credentials
      if ((payload.email === 'demo@example.com' && payload.password === 'demopass') || (payload.email && payload.password.length>=6)) {
        // on success, redirect or show success
        alert('Login successful — welcome!');
        // Uncomment to redirect to a dashboard
        // window.location.href = '/dashboard.html';
      } else {
        show(submitError);
      }
    });
  </script>
</body>
</html>
