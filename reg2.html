\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-container{
    max-width:1000px;
    width:100%;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2::after{
    content:"";
    display:block;
    width:80px;
    height:4px;
    background:#667eea;
    margin:10px auto;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container py-5">
<div class="form-container">

<h2 class="text-center mb-4">
Registration Form
</h2>

<form id="regForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">First Name</label>
<input type="text" id="fname" class="form-control" placeholder="Enter first name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Last Name</label>
<input type="text" id="lname" class="form-control" placeholder="Enter last name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Date of Birth</label>
<input type="date" id="dob" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter email">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" id="phone" class="form-control" placeholder="Phone Number">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Username</label>
<input type="text" id="uname" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Password</label>
<input type="password" id="pass" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" id="cpass" class="form-control">
</div>

<div class="col-12 mb-3">
<label class="form-label d-block">Gender</label>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="male" name="gender">
<label class="form-check-label" for="male">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="female" name="gender">
<label class="form-check-label" for="female">Female</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="other" name="gender">
<label class="form-check-label" for="other">Other</label>
</div>

</div>

<div class="col-12 mb-3">
<label class="form-label">Street Address</label>
<input type="text" id="address" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" id="city" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">State</label>
<input type="text" id="state" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Country</label>
<input type="text" id="country" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Postal Code</label>
<input type="text" id="zip" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Highest Qualification</label>

<select id="education" class="form-select">
<option value="">Select Qualification</option>
<option>High School</option>
<option>Diploma</option>
<option>Graduate</option>
<option>Post Graduate</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label class="form-label">Preferred Role</label>
<input type="text" id="role" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Work Experience</label>
<input type="number" id="exp" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Skills</label>
<input type="text" id="skills" class="form-control">
</div>

<div class="col-12 mb-3">
<label class="form-label">LinkedIn URL</label>
<input type="url" id="linkedin" class="form-control">
</div>

<div class="col-12 mb-4">

<div class="form-check">
<input class="form-check-input" type="checkbox" id="termsBox">
<label class="form-check-label" for="termsBox">
I agree to the Terms and Conditions
</label>
</div>

</div>

<div class="col-12 text-center">

<button class="btn btn-primary px-4 me-2" type="submit">
Register
</button>

<button class="btn btn-danger px-4" type="reset">
Reset
</button>

</div>

</div>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Keep your existing JavaScript validation here -->

</body>
</html>
